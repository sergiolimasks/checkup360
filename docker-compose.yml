version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cc360-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cc360local
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - cc360_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cc360-redis
    ports:
      - "6380:6379"
    volumes:
      - cc360_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cc360_pgdata:
  cc360_redis:
