<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Consulta Crédito</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260409b">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-page" class="login-container">
    <div class="login-box">
      <div class="login-brand">
        <div class="login-icon">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#22d3ee" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h1>Checkup<span>360</span></h1>
      </div>
      <p>Faça login para acessar o painel</p>
      <div id="loginError" class="alert alert-error"></div>
      <form id="loginForm">
        <div class="form-group"><label>Email</label><input type="email" id="login-email" required placeholder="admin@consultacredito.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="login-password" required placeholder="Sua senha"></div>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>
    </div>
  </div>
  <!-- APP -->
  <div id="app-page" class="app-container" style="display:none">
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#22d3ee" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span class="logo-text">Checkup<b>360</b></span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Expandir menu">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <nav class="sidebar-menu" id="sidebar-menu">
        <div class="menu-item" data-page="dashboard" onclick="App.navigate('dashboard')">
          <div class="menu-icon" title="Dashboard">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </div>
          <span class="menu-label">Dashboard</span>
        </div>
        <div class="menu-item" data-page="crm" onclick="App.navigate('crm')">
          <div class="menu-icon" title="CRM Pipeline">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3h18v18H3z" opacity="0"/><rect x="2" y="4" width="5" height="16" rx="1"/><rect x="9.5" y="8" width="5" height="12" rx="1"/><rect x="17" y="2" width="5" height="18" rx="1"/></svg>
          </div>
          <span class="menu-label">CRM Pipeline</span>
        </div>
        <div class="menu-item" data-page="leads" onclick="App.navigate('leads')">
          <div class="menu-icon" title="Leads">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <span class="menu-label">Leads</span>
        </div>
        <div class="menu-item has-submenu" data-page="templates">
          <div class="menu-item-main" onclick="App.toggleSubmenu(this.parentElement)">
            <div class="menu-icon" title="Templates">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <span class="menu-label">Templates</span>
            <svg class="submenu-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="submenu">
            <div class="submenu-item" data-page="templates" data-sub="list" onclick="App.navigate('templates','list')">
              <span class="submenu-dot"></span>
              <span class="menu-label">Visualizar</span>
            </div>
            <div class="submenu-item" data-page="templates" data-sub="create" onclick="App.navigate('templates','create')">
              <span class="submenu-dot"></span>
              <span class="menu-label">Criar Novo</span>
            </div>
          </div>
        </div>
        <div class="menu-item has-submenu" data-page="performance">
          <div class="menu-item-main" onclick="App.toggleSubmenu(this.parentElement)">
            <div class="menu-icon" title="Performance">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
            </div>
            <span class="menu-label">Performance</span>
            <svg class="submenu-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="submenu">
            <div class="submenu-item" data-page="performance" data-sub="pages" onclick="App.navigate('performance','pages')">
              <span class="submenu-dot"></span>
              <span class="menu-label">Landing Pages</span>
            </div>
            <div class="submenu-item" data-page="performance" data-sub="sources" onclick="App.navigate('performance','sources')">
              <span class="submenu-dot"></span>
              <span class="menu-label">Fontes & Campanhas</span>
            </div>
            <div class="submenu-item" data-page="performance" data-sub="ab" onclick="App.navigate('performance','ab')">
              <span class="submenu-dot"></span>
              <span class="menu-label">Testes A/B</span>
            </div>
          </div>
        </div>
        <div class="menu-item" data-page="users" onclick="App.navigate('users')">
          <div class="menu-icon" title="Usuários">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <span class="menu-label">Usuários</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" id="user-avatar">A</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Admin</div>
            <div class="user-role" id="user-role">admin</div>
          </div>
        </div>
        <button class="btn-logout" onclick="App.logout()" title="Sair">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span class="menu-label">Sair</span>
        </button>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <div class="main-content">
      <div class="top-bar">
        <button class="mobile-hamburger" id="mobile-hamburger" title="Menu">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 id="page-title">Dashboard</h2>
      </div>
      <div class="content-area" id="content-area"></div>
    </div>
  </div>
  <script src="utils.js?v=20260409b"></script>
  <script src="api.js?v=20260409b"></script>
  <script src="login.js?v=20260409b"></script>
  <script src="dashboard.js?v=20260409b"></script>
  <script src="leads.js?v=20260409b"></script>
  <script src="lead-detail.js?v=20260409b"></script>
  <script src="crm.js?v=20260409b"></script>
  <script src="templates.js?v=20260409b"></script>
  <script src="users.js?v=20260409b"></script>
  <script src="performance.js?v=20260409b"></script>
  <script src="app.js?v=20260409b"></script>
</body>
</html>
