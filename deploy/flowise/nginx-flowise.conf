# /etc/nginx/sites-available/flowise.checkup360.online
# Nginx reverse proxy para Flowise
# Ativar: ln -s /etc/nginx/sites-available/flowise.checkup360.online /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name flowise.checkup360.online;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Flowise uploads podem ser grandes
        client_max_body_size 50M;

        # WebSocket timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Rate limit na API de prediction
    location /api/v1/prediction/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
