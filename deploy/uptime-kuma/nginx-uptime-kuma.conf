# /etc/nginx/sites-available/status.checkup360.online
# Nginx reverse proxy para Uptime Kuma
# Ativar: ln -s /etc/nginx/sites-available/status.checkup360.online /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name status.checkup360.online;

    # Certbot vai adicionar redirect HTTPS automaticamente
    # sudo certbot --nginx -d status.checkup360.online

    location / {
        proxy_pass http://127.0.0.1:3390;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
